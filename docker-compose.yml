version: "3.8"

services:
  
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: leovmika68
      MYSQL_DATABASE: identity_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pleovmika68"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  discovery-server:
    build:
      context: .
      target: discovery-server
    container_name: discovery-server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8761:8761"
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-service:
    build:
      context: .
      target: identity-service
    container_name: identity-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
      - "9090:9090"
    env_file:
      - ./identity-service/.env
    networks:
      - backend 
    depends_on:
      discovery-server:
        condition: service_started
      mysql:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      target: api-gateway
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    networks:
      - backend
    depends_on:
      discovery-server:
        condition: service_started
      identity-service:
        condition: service_started
      redis:
        condition: service_healthy

  post-service:
    build:
      context: .
      target: post-service
    container_name: post-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8082:8082"

    env_file:
      - ./post-service/.env
    networks:
      - backend
    depends_on:
      discovery-server:
        condition: service_started
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - backend
    volumes:
      - minio_data:/data

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
  minio_data: