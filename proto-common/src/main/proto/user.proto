syntax = "proto3";

package com.example.proto;

option java_multiple_files = true;
option java_package = "com.example.proto";

message UserRequest {
  string userId = 1;
}

message UserResponse {
  string userId = 1;
  string username = 2;
  string email = 3;
  string role = 4;
}

service UserService {
  rpc GetUser(UserRequest) returns (UserResponse);
}
